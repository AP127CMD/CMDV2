name: Refresh data snapshots

# V2 is a mirror: it pulls Command Center's published flight-data.js and the
# ap127-data-api progress worker, then commits any change. Pages (legacy /
# deploy-from-branch) auto-rebuilds on push to main — no deploy step needed.

on:
  schedule:
    - cron: '20 * * * *'   # hourly, offset 20 min after CC's top-of-hour fetch
  workflow_dispatch:        # manual trigger from the Actions tab

permissions:
  contents: write           # push refreshed snapshots
  issues: write             # open an issue if a run fails

# Never let a manual run and the cron run push concurrently.
concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh snapshots (flight-data.js + progress-data.js)
        run: node scripts/refresh_snapshots.mjs

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flight-data.js progress-data.js
          if git diff --cached --quiet; then
            echo "No snapshot changes — nothing to commit."
          else
            git commit -m "chore: refresh data snapshots $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            # Rebase over any concurrent commit before pushing.
            git pull --rebase --autostash origin main
            git push origin main
          fi

      - name: Report failure as an issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[Refresh] Data snapshot run failed – ${new Date().toISOString().slice(0,16)} UTC`;
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'refresh-failure',
            });
            if (open.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title,
                body: [
                  `Workflow run failed: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                  '',
                  'The bundled snapshots may be stale. Likely causes:',
                  '- Command Center `flight-data.js` raw URL changed or that repo went private',
                  '- the `ap127-data-api` worker is down or changed its response shape',
                  '',
                  'Re-run manually from the Actions tab once the upstream is healthy.',
                ].join('\n'),
                labels: ['refresh-failure'],
              });
            }
